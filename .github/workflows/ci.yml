name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: backend_test
          POSTGRES_USER: backend_test_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U backend_test_user -d backend_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      TEST_DATABASE_URL: postgresql+psycopg://backend_test_user:ci_test_password@localhost:5432/backend_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Verify integration test database
        run: |
          test -n "$TEST_DATABASE_URL"
          python - <<'PY'
          import asyncio
          import os

          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine


          async def main() -> None:
              engine = create_async_engine(os.environ["TEST_DATABASE_URL"])
              try:
                  async with engine.connect() as connection:
                      result = await connection.execute(
                          text("SELECT current_database(), current_user")
                      )
                      database, user = result.one()
                      assert database == "backend_test"
                      assert user == "backend_test_user"
              finally:
                  await engine.dispose()


          asyncio.run(main())
          PY

      - name: Run Ruff checks
        run: ruff check app tests alembic

      - name: Check Ruff formatting
        run: ruff format --check app tests alembic

      - name: Run MyPy
        run: mypy app tests alembic

      - name: Run tests
        run: pytest
